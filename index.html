<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERIESTOPIA</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<header>
  <h1>🎬 SERIESTOPIA</h1>
  <nav>
    <button onclick="mostrarSeccion('tendencias')">🔥 Tendencias</button>
    <button onclick="mostrarSeccion('estrenos')">📅 Próximos Estrenos</button>
    <button onclick="mostrarSeccion('agenda')">🗓 Agenda</button>
    <button onclick="mostrarSeccion('miLista')">📌 Mi Lista</button>
    <button onclick="mostrarSeccion('buscar')">🔍 Buscar</button>
  </nav>
</header>

<section id="buscar" class="seccion">
  <input type="text" id="searchInput" placeholder="Buscar película o serie...">
  <select id="tipo">
    <option value="multi">Todo</option>
    <option value="movie">Película</option>
    <option value="tv">Serie</option>
  </select>
  <button onclick="buscar()">Buscar</button>
  <div id="contenedorBuscar" class="grid"></div>
</section>

<section id="tendencias" class="seccion grid"></section>
<section id="estrenos"  class="seccion grid"></section>
<section id="agenda"    class="seccion">
  <div id="agendaFiltros">
    <button onclick="filtrarAgenda('tv')">Series</button>
    <button onclick="filtrarAgenda('movie')">Películas</button>
  </div>
  <div id="agendaContainer"></div>
</section>
<section id="miLista"  class="seccion grid"></section>

<!-- Modal de detalle -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="cerrar" class="close">&times;</span>
    <div id="detalle"></div>
    <div id="plataformasContainer"></div>
    <div id="temporadasContainer"></div>
    <div id="acciones">
      <button id="agregarLista">Agregar a Mi Lista</button>
      <label>Puntuación:
        <select id="puntuacion">
          <option value="0">0</option>
          <option value="1">1⭐</option>
          <option value="2">2⭐</option>
          <option value="3">3⭐</option>
          <option value="4">4⭐</option>
          <option value="5">5⭐</option>
        </select>
      </label>
      <button id="recordar">📌 Recordarme</button>
      <button id="verTrailer">🎥 Ver Trailer</button>
    </div>
    <div id="trailerContainer"></div>
  </div>
</div>

<div id="exportImport">
  <button onclick="exportarLista()">💾 Exportar Mi Lista</button>
  <label for="importFile">Importar Mi Lista</label>
  <input type="file" id="importFile" accept=".json" onchange="importarLista(event)">
  <button onclick="exportarAlertas()">💌 Exportar Alertas</button>
</div>

<script src="./script.js"></script>
</body>
</html>
